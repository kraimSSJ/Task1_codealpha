<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SwiftShop - Modern E-Commerce</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="icon" href="favicon.png">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <link rel="stylesheet" href="Task1.css">
</head>
<body class="text-gray-900">

    <nav class="sticky top-0 z-50 glass-effect border-b border-gray-200">
        <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
            <div class="flex justify-between h-16 items-center">
                <div class="flex items-center gap-2 cursor-pointer" onclick="showView('home')">
                    <div class="bg-indigo-600 p-2 rounded-lg text-white">
                        <i class="fas fa-shopping-bag text-xl"></i>
                    </div>
                    <span class="text-2xl font-bold tracking-tight text-indigo-600">SwiftShop</span>
                </div>

                <div class="hidden md:flex items-center space-x-8">
                    <button onclick="showView('home')" class="hover:text-indigo-600 font-medium transition">Shop</button>
                    <button onclick="filterCategory('Electronics')" class="hover:text-indigo-600 font-medium transition">Electronics</button>
                    <button onclick="filterCategory('Apparel')" class="hover:text-indigo-600 font-medium transition">Apparel</button>
                    <button onclick="filterCategory('Home')" class="hover:text-indigo-600 font-medium transition">Home</button>
                </div>

                <div class="flex items-center space-x-5">
                    <div id="auth-links" class="flex items-center space-x-4">
                        <button onclick="showView('login')" class="text-sm font-semibold hover:text-indigo-600">Login</button>
                        <button onclick="showView('register')" class="bg-indigo-600 text-white px-4 py-2 rounded-full text-sm font-bold hover:bg-indigo-700 transition">Join</button>
                    </div>
                    <div id="user-profile" class="hidden flex items-center space-x-4">
                        <button onclick="showView('orders')" class="text-gray-600 hover:text-indigo-600"><i class="fas fa-history"></i></button>
                        <span id="username-display" class="font-medium text-sm"></span>
                        <button onclick="logout()" class="text-xs text-red-500 underline">Logout</button>
                    </div>
                    <button onclick="toggleCart()" class="relative p-2 text-gray-600 hover:text-indigo-600 transition">
                        <i class="fas fa-cart-shopping text-xl"></i>
                        <span id="cart-count" class="absolute -top-1 -right-1 bg-indigo-600 text-white text-[10px] font-bold px-1.5 py-0.5 rounded-full">0</span>
                    </button>
                </div>
            </div>
        </div>
    </nav>

    <main class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-8 min-h-screen">
        <section id="view-home" class="view">
            <div class="flex flex-col md:flex-row md:items-center justify-between mb-8 gap-4">
                <h1 id="category-title" class="text-3xl font-extrabold text-gray-900">Featured Products</h1>
                <div class="flex items-center bg-white border border-gray-300 rounded-lg px-3 py-2 shadow-sm focus-within:ring-2 focus-within:ring-indigo-500">
                    <i class="fas fa-search text-gray-400 mr-2"></i>
                    <input type="text" oninput="searchProducts(this.value)" placeholder="Search products..." class="outline-none text-sm w-full md:w-64">
                </div>
            </div>
            <div id="product-grid" class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-4 gap-8"></div>
        </section>

        <section id="view-orders" class="view hidden">
            <h2 class="text-3xl font-bold mb-8 text-center">Your Order History</h2>
            <div id="orders-list" class="max-w-2xl mx-auto space-y-4"></div>
        </section>

        <section id="view-login" class="view hidden">
            <div class="max-w-md mx-auto bg-white p-8 rounded-2xl shadow-xl border border-gray-100">
                <h2 class="text-2xl font-bold mb-6 text-center">Welcome Back</h2>
                <form onsubmit="handleAuth(event, 'login')" class="space-y-4">
                    <div>
                        <label class="block text-sm font-medium text-gray-700">Email</label>
                        <input type="email" required class="w-full mt-1 p-3 border rounded-lg focus:ring-2 focus:ring-indigo-500 outline-none">
                    </div>
                    <div>
                        <label class="block text-sm font-medium text-gray-700">Password</label>
                        <input type="password" required class="w-full mt-1 p-3 border rounded-lg focus:ring-2 focus:ring-indigo-500 outline-none">
                    </div>
                    <button type="submit" class="w-full bg-indigo-600 text-white py-3 rounded-lg font-bold hover:bg-indigo-700 transition">Sign In</button>
                </form>
                <p class="mt-4 text-center text-sm text-gray-600">
                    Don't have an account? <a href="#" onclick="showView('register')" class="text-indigo-600 font-bold">Register here</a>
                </p>
            </div>
        </section>

        <section id="view-register" class="view hidden">
            <div class="max-w-md mx-auto bg-white p-8 rounded-2xl shadow-xl border border-gray-100">
                <h2 class="text-2xl font-bold mb-6 text-center">Create Account</h2>
                <form onsubmit="handleAuth(event, 'register')" class="space-y-4">
                    <div>
                        <label class="block text-sm font-medium text-gray-700">Full Name</label>
                        <input type="text" id="reg-name" required class="w-full mt-1 p-3 border rounded-lg focus:ring-2 focus:ring-indigo-500 outline-none">
                    </div>
                    <div>
                        <label class="block text-sm font-medium text-gray-700">Email Address</label>
                        <input type="email" required class="w-full mt-1 p-3 border rounded-lg focus:ring-2 focus:ring-indigo-500 outline-none">
                    </div>
                    <div>
                        <label class="block text-sm font-medium text-gray-700">Password</label>
                        <input type="password" required class="w-full mt-1 p-3 border rounded-lg focus:ring-2 focus:ring-indigo-500 outline-none">
                    </div>
                    <button type="submit" class="w-full bg-indigo-600 text-white py-3 rounded-lg font-bold hover:bg-indigo-700 transition">Create Account</button>
                </form>
                <p class="mt-4 text-center text-sm text-gray-600">
                    Already registered? <a href="#" onclick="showView('login')" class="text-indigo-600 font-bold">Login here</a>
                </p>
            </div>
        </section>
    </main>

    <div id="cart-sidebar" class="fixed inset-0 z-[60] hidden">
        <div class="absolute inset-0 bg-black bg-opacity-40" onclick="toggleCart()"></div>
        <div class="absolute right-0 top-0 h-full w-full max-w-md bg-white shadow-2xl flex flex-col transform transition-transform duration-300">
            <div class="p-6 border-b flex justify-between items-center">
                <h3 class="text-xl font-bold">Your Cart</h3>
                <button onclick="toggleCart()" class="text-gray-400 hover:text-gray-600"><i class="fas fa-times text-xl"></i></button>
            </div>
            <div id="cart-items" class="flex-grow overflow-y-auto p-6 space-y-4 custom-scrollbar"></div>
            <div class="p-6 border-t bg-gray-50">
                <div class="flex justify-between text-lg font-bold mb-4">
                    <span>Total</span>
                    <span id="cart-total">$0.00</span>
                </div>
                <button onclick="processCheckout()" class="w-full bg-indigo-600 text-white py-4 rounded-xl font-bold hover:bg-indigo-700 transition shadow-lg shadow-indigo-200">
                    Place Order
                </button>
            </div>
        </div>
    </div>

    <div id="product-modal" class="fixed inset-0 z-[70] hidden flex items-center justify-center p-4">
        <div class="absolute inset-0 bg-black bg-opacity-60" onclick="closeProductModal()"></div>
        <div class="relative bg-white max-w-4xl w-full rounded-2xl overflow-hidden shadow-2xl flex flex-col md:flex-row">
            <button onclick="closeProductModal()" class="absolute top-4 right-4 z-10 text-gray-500 hover:text-gray-800 bg-white rounded-full w-8 h-8 flex items-center justify-center shadow">
                <i class="fas fa-times"></i>
            </button>
            <div class="md:w-1/2 bg-gray-100">
                <img id="modal-img" src="" alt="" class="w-full h-full object-cover">
            </div>
            <div class="md:w-1/2 p-8 flex flex-col justify-center">
                <span id="modal-category" class="text-indigo-600 text-xs font-bold uppercase tracking-widest mb-2">Category</span>
                <h2 id="modal-title" class="text-3xl font-extrabold mb-4">Product Name</h2>
                <p id="modal-desc" class="text-gray-600 mb-6 leading-relaxed">Detailed description.</p>
                <div class="text-2xl font-bold text-gray-900 mb-8" id="modal-price">$0.00</div>
                <button id="modal-add-btn" class="w-full bg-indigo-600 text-white py-4 rounded-xl font-bold hover:bg-indigo-700 transition">
                    Add to Cart
                </button>
            </div>
        </div>
    </div>

    <div id="toast" class="fixed bottom-8 left-1/2 transform -translate-x-1/2 bg-gray-900 text-white px-6 py-3 rounded-full text-sm font-medium shadow-2xl opacity-0 transition-opacity pointer-events-none z-[100]">
        Added to cart!
    </div>

    <script src="Task1.js"></script>
</body>
</html>
